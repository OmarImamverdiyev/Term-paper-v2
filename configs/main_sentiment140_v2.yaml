seed: 42

runtime:
  device: auto
  deterministic_torch: true

output:
  run_name: main_sentiment140_full
  results_dir: results
  logs_dir: logs
  models_dir: models
  splits_dir: splits
  save_predictions: false

datasets:
  sentiment140_full:
    path: Sentiment140_v2.csv
    text_column: text
    label_column: polarity
    task_type: binary
    positive_label: 4
    split:
      mode: create_or_reuse
      artifact_name: sentiment140_v2_binary_split_v1
      train_size: 0.7
      val_size: 0.15
      test_size: 0.15
      seed: 42

preprocessing:
  social_default:
    lowercase: true
    url_handling: mask
    mention_handling: mask
    hashtag_handling: strip_hash
    punctuation_handling: keep_sentiment
    compress_punctuation: true
    number_handling: mask
    whitespace_cleanup: true
    preserve_emojis: true
    stopwords:
      enabled: false
      source: list
      words: []
    normalization:
      enabled: false
      type: none

features:
  count_unigram_bigram:
    type: count
    ngram_range: [1, 2]
    max_features: 15000
    min_df: 2

  tfidf_unigram_bigram:
    type: tfidf
    ngram_range: [1, 2]
    max_features: 15000
    min_df: 2

  pmi_signed:
    type: pmi
    ngram_range: [1, 1]
    max_features: 10000
    min_df: 2
    binary_occurrence: true
    smoothing: 1.0e-09
    use_positive_pmi: false

  word2vec_default:
    type: word2vec
    vector_size: 200
    window: 5
    min_count: 2
    sequence_min_freq: 2
    epochs: 15
    workers: 4
    sg: 1
    negative: 10
    sample: 1.0e-5
    ns_exponent: 0.75
    alpha: 0.025
    min_alpha: 0.0007
    max_sequence_length: 56
    truncation_strategy: head
    embedding_init_std: 0.05

models:
  multinomial_nb:
    type: multinomial_nb
    alpha: 1.0

  linear_logreg:
    type: linear
    algorithm: logistic_regression
    c: 1.0
    max_iter: 2000
    solver: liblinear

  mlp_default:
    type: mlp
    hidden_dims: [128, 32]
    dropout: 0.2
    batch_size: 128
    epochs: 2
    patience: 1
    learning_rate: 0.001

  birnn_default:
    type: birnn
    hidden_dim: 128
    num_layers: 1
    dropout: 0.35
    embedding_dropout: 0.15
    embedding_trainable: true
    pooling: mean_max
    classifier_hidden_dim: 128
    batch_size: 128
    eval_batch_size: 256
    epochs: 15
    patience: 4
    early_stopping_min_delta: 0.0005
    learning_rate: 0.001
    optimizer: adam
    weight_decay: 1.0e-5
    gradient_clip_norm: 1.0
    checkpoint_metric: macro_f1
    class_weights: none
    scheduler:
      type: reduce_on_plateau
      mode: max
      factor: 0.5
      patience: 1
      threshold: 0.0005
      min_lr: 1.0e-5

  lstm_default:
    type: lstm
    hidden_dim: 128
    num_layers: 1
    dropout: 0.35
    embedding_dropout: 0.15
    embedding_trainable: true
    pooling: mean_max
    classifier_hidden_dim: 128
    batch_size: 128
    eval_batch_size: 256
    epochs: 15
    patience: 4
    early_stopping_min_delta: 0.0005
    learning_rate: 0.001
    optimizer: adam
    weight_decay: 1.0e-5
    gradient_clip_norm: 1.0
    checkpoint_metric: macro_f1
    class_weights: none
    scheduler:
      type: reduce_on_plateau
      mode: max
      factor: 0.5
      patience: 1
      threshold: 0.0005
      min_lr: 1.0e-5

experiments:
  - name: s140_full_count_nb
    dataset: sentiment140_full
    preprocessing: social_default
    feature: count_unigram_bigram
    model: multinomial_nb

  - name: s140_full_tfidf_nb
    dataset: sentiment140_full
    preprocessing: social_default
    feature: tfidf_unigram_bigram
    model: multinomial_nb

  - name: s140_full_count_linear
    dataset: sentiment140_full
    preprocessing: social_default
    feature: count_unigram_bigram
    model: linear_logreg

  - name: s140_full_tfidf_linear
    dataset: sentiment140_full
    preprocessing: social_default
    feature: tfidf_unigram_bigram
    model: linear_logreg

  - name: s140_full_count_mlp
    dataset: sentiment140_full
    preprocessing: social_default
    feature: count_unigram_bigram
    model: mlp_default

  - name: s140_full_tfidf_mlp
    dataset: sentiment140_full
    preprocessing: social_default
    feature: tfidf_unigram_bigram
    model: mlp_default

  - name: s140_full_pmi_linear
    dataset: sentiment140_full
    preprocessing: social_default
    feature: pmi_signed
    model: linear_logreg

  - name: s140_full_word2vec_birnn
    dataset: sentiment140_full
    preprocessing: social_default
    feature: word2vec_default
    model: birnn_default

  - name: s140_full_word2vec_lstm
    dataset: sentiment140_full
    preprocessing: social_default
    feature: word2vec_default
    model: lstm_default
